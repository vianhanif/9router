name: Run Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Install test dependencies
        run: npm install --no-audit --no-fund
        working-directory: tests

      - name: Run tests
        run: npx vitest run --reporter=verbose --exclude "**/unit/{antigravity-mitm,buildOutputFilter,claude-header-forwarding,db-benchmark,embeddings.cloud,kiro-model-slots,oauth-cursor-auto-import,openai-to-claude,rtk,translator-request-normalization}.test.js"
        working-directory: tests
