name: Deploy to Koyeb

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: "9router-${{ github.ref_name }}"
      cancel-in-progress: true
    steps:
      - name: Install Koyeb CLI
        uses: koyeb-community/koyeb-actions@v2
        with:
          api_token: "${{ secrets.KOYEB_API_TOKEN }}"

      - name: Build and deploy
        uses: koyeb/action-git-deploy@v1
        with:
          app-name: 9router
          service-name: 9router
          service-type: web
          service-instance-type: nano
          service-regions: fra
          git-builder: docker
          git-branch: master
          service-ports: "20128:http"
          service-routes: "/:20128"
          service-checks: "20128:http:/api/health"
          service-env: "PORT=20128,HOSTNAME=0.0.0.0,NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1,ENABLE_REQUEST_LOGS=false,AUTH_COOKIE_SECURE=true,DATA_DIR=/app/data"
