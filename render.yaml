services:
  - type: web
    name: 9router
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: INITIAL_PASSWORD
        generateValue: true
      - key: PORT
        value: "20128"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: ENABLE_REQUEST_LOGS
        value: "false"
      - key: OBSERVABILITY_ENABLED
        value: "true"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: BASE_URL
        fromService:
          type: web
          name: 9router
          property: hostport
      - key: NEXT_PUBLIC_BASE_URL
        fromService:
          type: web
          name: 9router
          property: hostport
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
